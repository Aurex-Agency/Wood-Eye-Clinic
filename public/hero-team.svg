<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Wood Eye Clinic team">
  <defs>
    <linearGradient id="room" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e9e4da"/>
      <stop offset="0.6" stop-color="#d9d2c6"/>
      <stop offset="1" stop-color="#b8ac99"/>
    </linearGradient>
    <radialGradient id="warm" cx="0.5" cy="0.42" r="0.75">
      <stop offset="0" stop-color="#fff6e8" stop-opacity="0.75"/>
      <stop offset="1" stop-color="#fff6e8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c9beac"/>
      <stop offset="1" stop-color="#a8997f"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="1000" fill="url(#room)"/>
  <rect width="1600" height="1000" fill="url(#warm)"/>

  <!-- floor band -->
  <rect x="0" y="760" width="1600" height="240" fill="url(#floor)"/>
  <rect x="0" y="758" width="1600" height="4" fill="#efe9df" opacity="0.6"/>

  <!-- framed abstract artwork echoing the clinic wall -->
  <g transform="translate(1050 190)">
    <rect x="-8" y="-8" width="416" height="336" fill="#8a7c66" opacity="0.5"/>
    <rect width="400" height="320" fill="#d7cdbb"/>
    <g opacity="0.85">
      <rect x="20" y="20" width="110" height="110" fill="#9a6a4a"/>
      <path d="M150 20 h110 v110 h-110 z" fill="#c9a24a"/>
      <path d="M150 20 L260 130 H150 Z" fill="#7d8b6a"/>
      <rect x="280" y="20" width="100" height="110" fill="#b5651d"/>
      <circle cx="330" cy="75" r="42" fill="#e0d3a8"/>
      <rect x="20" y="150" width="110" height="150" fill="#5f6f5a"/>
      <circle cx="205" cy="225" r="55" fill="#c98a3c"/>
      <rect x="280" y="150" width="100" height="150" fill="#8a8f7c"/>
      <circle cx="330" cy="230" r="34" fill="#efe6cf"/>
    </g>
  </g>

  <!-- doorway suggestion -->
  <rect x="150" y="230" width="230" height="530" fill="#cfc7b8"/>
  <rect x="150" y="230" width="230" height="530" fill="none" stroke="#efe9df" stroke-width="8"/>

  <!-- soft warm light bloom -->
  <circle cx="800" cy="520" r="360" fill="#fff3df" opacity="0.28"/>

  <!-- brand eye mark badge, lower center -->
  <g transform="translate(800 620)" opacity="0.9">
    <ellipse cx="0" cy="0" rx="70" ry="42" fill="none" stroke="#0075a1" stroke-width="9"/>
    <circle cx="0" cy="0" r="20" fill="#0075a1"/>
    <circle cx="7" cy="-7" r="6" fill="#ffffff"/>
  </g>
</svg>
