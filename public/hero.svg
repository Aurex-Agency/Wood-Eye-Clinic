<svg width="900" height="1100" viewBox="0 0 900 1100" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Wood Eye Clinic — clear vision">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0.35" y2="1">
      <stop offset="0" stop-color="#bcedff"/>
      <stop offset="0.45" stop-color="#5cb7dc"/>
      <stop offset="1" stop-color="#00445e"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.38" r="0.7">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="0.4" stop-color="#e8faff" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#00445e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lens" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="0.5" stop-color="#bcedff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="frame" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#083b52"/>
      <stop offset="1" stop-color="#0075a1"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="900" height="1100" fill="url(#sky)"/>
  <rect width="900" height="1100" fill="url(#glow)"/>

  <!-- soft bokeh -->
  <g opacity="0.5" filter="url(#soft)">
    <circle cx="180" cy="220" r="90" fill="#ffffff" opacity="0.5"/>
    <circle cx="740" cy="180" r="60" fill="#ffffff" opacity="0.35"/>
    <circle cx="700" cy="900" r="120" fill="#bcedff" opacity="0.4"/>
    <circle cx="150" cy="820" r="80" fill="#ffffff" opacity="0.25"/>
  </g>

  <!-- horizon light band -->
  <rect x="0" y="560" width="900" height="4" fill="#ffffff" opacity="0.35"/>

  <!-- elegant spectacles -->
  <g transform="translate(450 540)">
    <g stroke="url(#frame)" stroke-width="20" fill="none" stroke-linecap="round">
      <path d="M-300 -70 L-232 -30"/>
      <path d="M300 -70 L232 -30"/>
      <path d="M-70 -8 Q0 -46 70 -8"/>
    </g>
    <!-- left lens -->
    <circle cx="-150" cy="0" r="118" fill="url(#lens)" stroke="url(#frame)" stroke-width="22"/>
    <circle cx="-150" cy="0" r="118" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.5"/>
    <ellipse cx="-186" cy="-40" rx="42" ry="26" fill="#ffffff" opacity="0.55" transform="rotate(-30 -186 -40)"/>
    <!-- right lens -->
    <circle cx="150" cy="0" r="118" fill="url(#lens)" stroke="url(#frame)" stroke-width="22"/>
    <circle cx="150" cy="0" r="118" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.5"/>
    <ellipse cx="114" cy="-40" rx="42" ry="26" fill="#ffffff" opacity="0.55" transform="rotate(-30 114 -40)"/>
  </g>

  <!-- lower light wash for badge legibility -->
  <rect x="0" y="760" width="900" height="340" fill="#00445e" opacity="0.28"/>
</svg>
